<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canvas Studio</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="paint-app" aria-label="Canvas Studio">
      <header class="topbar">
        <div class="window-controls" aria-hidden="true">
          <span class="window-dot close"></span>
          <span class="window-dot minimize"></span>
          <span class="window-dot zoom"></span>
        </div>

        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <span></span>
          </span>
          <span>Canvas Studio</span>
        </div>

        <div class="toolbar-group" aria-label="File actions">
          <button class="icon-button" id="undoBtn" type="button" title="Undo" aria-label="Undo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7H4v5"/><path d="M4 7l6 6"/><path d="M20 17a7 7 0 0 0-7-7H5"/></svg>
          </button>
          <button class="icon-button" id="redoBtn" type="button" title="Redo" aria-label="Redo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 7h5v5"/><path d="M20 7l-6 6"/><path d="M4 17a7 7 0 0 1 7-7h8"/></svg>
          </button>
          <button class="icon-button danger" id="clearBtn" type="button" title="Clear canvas" aria-label="Clear canvas">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
          </button>
          <button class="icon-button" id="downloadBtn" type="button" title="Download PNG" aria-label="Download PNG">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
          </button>
        </div>
      </header>

      <section class="workspace">
        <aside class="tool-rail" aria-label="Tools">
          <button class="tool-button active" type="button" data-tool="brush" title="Brush" aria-label="Brush">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20c2 0 4-1 4-4"/><path d="M8 16l9.5-9.5a2.1 2.1 0 0 1 3 3L11 19"/><path d="M8 16l3 3"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="eraser" title="Eraser" aria-label="Eraser">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 21h10"/><path d="M5 13l7-7a3 3 0 0 1 4 0l3 3a3 3 0 0 1 0 4l-8 8H7l-4-4a3 3 0 0 1 0-4z"/><path d="M13 8l6 6"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="line" title="Line" aria-label="Line">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19L19 5"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="rect" title="Rectangle" aria-label="Rectangle">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="6" width="14" height="12" rx="1"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="ellipse" title="Ellipse" aria-label="Ellipse">
            <svg viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="12" rx="7" ry="5"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="text" title="Text" aria-label="Text">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14"/><path d="M12 5v14"/><path d="M8 19h8"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="fill" title="Fill" aria-label="Fill">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13l8-8 7 7-8 8z"/><path d="M4 13l7 7"/><path d="M19 16c1.2 1.5 2 2.7 2 3.8a2 2 0 0 1-4 0c0-1.1.8-2.3 2-3.8z"/></svg>
          </button>
          <button class="tool-button" type="button" data-tool="picker" title="Color picker" aria-label="Color picker">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5l5 5"/><path d="M12 7l5 5-8.5 8.5H4v-4.5z"/><path d="M17 3l4 4-2 2-4-4z"/></svg>
          </button>
        </aside>

        <section class="panel controls-panel" aria-label="Paint controls">
          <div class="control-block">
            <span class="control-title">Color</span>
            <label class="color-picker-shell" title="Primary color">
              <input id="colorPicker" type="color" value="#1f7ae0" aria-label="Primary color">
            </label>
            <div class="swatches" id="swatches" aria-label="Color swatches"></div>
          </div>

          <div class="control-block">
            <label class="control-title" for="brushSize">Size <span id="brushSizeValue">8</span></label>
            <input id="brushSize" type="range" min="1" max="64" value="8" aria-label="Brush size">
          </div>

          <div class="control-block two-columns">
            <label class="toggle-row" title="Fill shape">
              <input id="shapeFill" type="checkbox">
              <span>Fill</span>
            </label>
            <label class="toggle-row" title="Snap line angle">
              <input id="snapAngle" type="checkbox">
              <span>Snap</span>
            </label>
          </div>
        </section>

        <section class="canvas-area" aria-label="Canvas area">
          <div class="canvas-stage">
            <canvas id="paintCanvas" width="1200" height="760"></canvas>
            <div class="cursor-preview" id="cursorPreview" aria-hidden="true"></div>
          </div>
        </section>
      </section>

      <footer class="statusbar">
        <span class="status-pill" id="statusTool">Brush</span>
        <span id="statusPosition">0, 0</span>
        <span id="historyStatus">Undo 0 · Redo 0</span>
        <span>1200 x 760</span>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
